name: $(Build.DefinitionName)_$(SourceBranchName)_$(Date:yyyyMMdd)$(Rev:.r)

trigger:
  - dev

pool:
  vmImage: "ubuntu-latest"
variables:
  scratch_org_username: $(Build.BuildNumber)@provartesting.com
  connection_name: Admin
  provar_major_version: latest
  provar_default_version: latest
  instance_url: https://login.salesforce.com
  test_environment: ProvarDX
  provardx_property_file: provardx-properties-docker.json
steps:
  # Download secure file
  # Download a secure file to the agent machine
  - task: DownloadSecureFile@1
    name: serverKey # The name with which to reference the secure file's path on the agent, like $(mySecureFile.secureFilePath)
    inputs:
      secureFile: "server.key"

  - task: Docker@2
    inputs:
      containerRegistry: 'Provar Testing Docker Hub'
      command: 'build'
      Dockerfile: '**/Dockerfile'
      tags: 'provar/$(Build.BuildId)'
      arguments: '
      --build-arg CONSUMER_KEY=$(consumer_key) 
      --build-arg SERVER_KEY_PATH=$(serverKey.secureFilePath) 
      --build-arg CONNECTION_NAME=$(connection_name) 
      --build-arg SCRATCH_ORG_USERNAME=$(scratch_org_username) 
      --build-arg PROVAR_DEFAULT_VERISON=$(provar_default_version) 
      --build-arg PROVAR_MAJOR_VERSION=$(provar_major_version) 
      --build-arg DEV_HUB_USERNAME=$(dev_hub_username) 
      --build-arg DEV_HUB_ALIAS=$(dev_hub_alias)
      --build-arg PROVAR_sf_Admin_password=$(PROVAR_sf_Admin_password)
      --build-arg PROVAR_sf_Admin=$(PROVAR_sf_Admin)
      --build-arg SCRATCH_ORG_ALIAS=$(scratch_org_alias)
      --build-arg ProvarSecretsPassword=$(secrets_password)
      --builg-arg ENV=$(test_environment)
      --build-arg INSTANCE_URL=$(instance_url)
      --build-arg PROVARDX_PROPERTY_FILE=$(provardx_property_file)'

  - script: |
      docker run --name provardx-docker --rm -d provar/$(Build.BuildId)
      docker cp provardx-docker:/home/ProvarProject/ANT/Results $(System.DefaultWorkingDirectory)
      docker exec provardx-docker sfdx force:org:delete -u $(scratch_org_alias) --noprompt
      docker stop provardx-docker
    displayName: "Run Provar Tests & Copy Results"

  # Publish Test Results
  - task: PublishTestResults@2
    inputs:
      testResultsFormat: "JUnit" # Options: JUnit, NUnit, VSTest, xUnit, cTest
      testResultsFiles: "**/Results/*.xml"
      #searchFolder: '$(System.DefaultWorkingDirectory)' # Optional
      #mergeTestResults: false # Optional
      failTaskOnFailedTests: true # Optional
      testRunTitle: ProvarDX Test Suite # Optional
    displayName: "Publish JUnit Test Results"
